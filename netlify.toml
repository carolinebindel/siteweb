# Netlify configuration for carolinebindel.fr

[build]
  publish = "."
  functions = "netlify/functions"

# Redirects — clean URLs
[[redirects]]
  from = "/cite-radieuse-podcast"
  to = "/cite-radieuse-podcast.html"
  status = 200

[[redirects]]
  from = "/mentions-legales"
  to = "/mentions-legales.html"
  status = 200

[[redirects]]
  from = "/politique-de-confidentialite"
  to = "/politique-de-confidentialite.html"
  status = 200

# Headers — security & caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
